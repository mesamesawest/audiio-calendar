<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audiio — Campaign Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f6f3;
  --surface:#ffffff;
  --surface2:#f0ede8;
  --surface3:#e8e4de;
  --border:#e2ddd7;
  --border2:#ccc8c0;
  --text:#111111;
  --text-mid:#888070;
  --text-dim:#b8b0a4;
  --accent:#111111;

  --hans:#4a7c00;
  --hans-bg:rgba(74,124,0,.09);
  --hans-bd:rgba(74,124,0,.3);

  --plugin:#006d99;
  --plugin-bg:rgba(0,109,153,.09);
  --plugin-bd:rgba(0,109,153,.3);

  --lifecycle:#b84000;
  --lifecycle-bg:rgba(184,64,0,.09);
  --lifecycle-bd:rgba(184,64,0,.3);

  --internal:#5b35c4;
  --internal-bg:rgba(91,53,196,.09);
  --internal-bd:rgba(91,53,196,.3);

  --r:7px;
  --font:'Inter',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;-webkit-font-smoothing:antialiased}

/* HEADER */
.hdr{padding:16px 32px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;position:sticky;top:0;z-index:100;background:var(--bg)}
.hdr-logo{display:flex;align-items:center;gap:10px}
.logo-img{height:28px;width:auto;display:block}
.logo-divider{width:1px;height:20px;background:var(--border2);margin:0 2px}
.logo-sub{font-size:12px;color:var(--text-mid);font-weight:500;letter-spacing:.01em}
.hdr-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}

/* LEGEND */
.legend{display:flex;gap:3px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:3px}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;letter-spacing:.02em;color:var(--text-mid);cursor:pointer;transition:all .15s;padding:5px 10px;border-radius:5px;user-select:none}
.leg:hover,.leg.on{background:var(--surface2);color:var(--text)}
.leg-dot{width:7px;height:7px;border-radius:2px;flex-shrink:0}

/* BUTTONS */
.btn{font-family:var(--font);font-size:12px;font-weight:600;padding:8px 16px;border-radius:var(--r);border:none;cursor:pointer;transition:all .15s}
.btn-p{background:var(--text);color:#fff}.btn-p:hover{opacity:.85}
.btn-g{background:transparent;color:var(--text-mid);border:1px solid var(--border2)}.btn-g:hover{color:var(--text);border-color:var(--text-mid)}
.btn-sm{font-size:11px;padding:6px 13px}

/* NAV */
.nav{display:flex;align-items:center;padding:10px 32px;border-bottom:1px solid var(--border);background:var(--surface);gap:0;position:sticky;top:61px;z-index:90}
.nav-btn{background:none;border:1px solid var(--border2);color:var(--text-mid);width:28px;height:28px;border-radius:var(--r);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:13px}
.nav-btn:hover{color:var(--text);border-color:var(--text);background:var(--surface2)}
.nav-month{font-size:14px;font-weight:600;padding:0 18px;min-width:150px;text-align:center;letter-spacing:-.01em}
.nav-right{margin-left:auto;display:flex;gap:3px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:3px}
.vbtn{font-family:var(--font);font-size:11px;font-weight:600;padding:4px 13px;border-radius:5px;border:none;background:none;color:var(--text-mid);cursor:pointer;transition:all .15s}
.vbtn.on{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.vbtn:hover:not(.on){color:var(--text)}

/* GRID */
.cwrap{padding:0 32px 48px;overflow:hidden}
.dhdrs{display:none}
.dhdr{padding:9px 10px;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim);border-right:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:109px;z-index:50}
.grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));border-left:1px solid var(--border);border-top:1px solid var(--border);margin-top:20px}
.cell{min-height:116px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:7px;position:relative;transition:background .1s;background:var(--surface)}
.cell.other{background:var(--bg);opacity:.6}
.cell.today{background:#fffef5}
.cell.today .dnum{background:var(--text);color:#fff;border-radius:50%;font-weight:700}
.cell:hover{background:var(--surface2)}
.cell.dover{background:var(--surface3);outline:1px dashed var(--border2)}
.dnum{font-size:11px;font-weight:500;color:var(--text-dim);width:22px;height:22px;display:flex;align-items:center;justify-content:center;margin-bottom:3px}
.addbtn{position:absolute;top:5px;right:5px;width:18px;height:18px;border-radius:50%;background:var(--surface2);border:1px solid var(--border2);color:var(--text-dim);font-size:14px;line-height:1;display:none;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.cell:hover .addbtn{display:flex}
.addbtn:hover{background:var(--text);color:#fff;border-color:var(--text)}

/* EVENTS */
.ev{border-radius:4px;padding:3px 7px;margin-bottom:2px;font-size:10.5px;font-weight:600;line-height:1.35;cursor:pointer;border-left:2px solid;transition:filter .12s;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;max-width:100%}
.ev:hover{filter:brightness(.94)}
.ev.hans{background:var(--hans-bg);border-color:var(--hans);color:var(--hans)}
.ev.plugin{background:var(--plugin-bg);border-color:var(--plugin);color:var(--plugin)}
.ev.lifecycle{background:var(--lifecycle-bg);border-color:var(--lifecycle);color:var(--lifecycle)}
.ev.internal{background:var(--internal-bg);border-color:var(--internal);color:var(--internal)}

/* LIST */
.lv{padding:0 32px 48px;margin-top:20px;display:none}
.lmonth{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);padding:16px 0 8px;border-bottom:1px solid var(--border)}
.lrow{display:flex;align-items:flex-start;gap:14px;padding:11px 10px;border-bottom:1px solid var(--border);cursor:pointer;border-radius:var(--r);transition:background .1s}
.lrow:hover{background:var(--surface2)}
.ldate{font-size:11px;font-weight:500;color:var(--text-mid);width:48px;flex-shrink:0;padding-top:2px}
.ldot{width:7px;height:7px;border-radius:2px;flex-shrink:0;margin-top:4px}
.ltitle{font-size:13px;font-weight:600}
.ltitle.hans{color:var(--hans)}.ltitle.plugin{color:var(--plugin)}.ltitle.lifecycle{color:var(--lifecycle)}.ltitle.internal{color:var(--internal)}
.lnote{font-size:11px;color:var(--text-mid);margin-top:2px;line-height:1.4}
.ltag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;flex-shrink:0;margin-top:2px}
.ltag.hans{background:var(--hans-bg);color:var(--hans)}.ltag.plugin{background:var(--plugin-bg);color:var(--plugin)}.ltag.lifecycle{background:var(--lifecycle-bg);color:var(--lifecycle)}.ltag.internal{background:var(--internal-bg);color:var(--internal)}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:none;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
.ov.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:100%;max-width:450px;padding:26px;position:relative;animation:su .18s ease;box-shadow:0 16px 48px rgba(0,0,0,.14)}
@keyframes su{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.mtitle{font-size:15px;font-weight:700;margin-bottom:18px;letter-spacing:-.01em}
.mclose{position:absolute;top:14px;right:14px;background:none;border:none;color:var(--text-mid);font-size:20px;cursor:pointer;line-height:1;padding:4px;border-radius:4px;transition:all .12s}
.mclose:hover{color:var(--text);background:var(--surface2)}
.field{margin-bottom:13px}
.field label{display:block;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-mid);margin-bottom:5px}
.field input,.field textarea{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:var(--r);color:var(--text);font-family:var(--font);font-size:13px;padding:9px 11px;outline:none;transition:border .15s}
.field input:focus,.field textarea:focus{border-color:var(--text)}
.field textarea{min-height:65px;resize:vertical}
.mrow{display:flex;gap:10px}.mrow .field{flex:1}
.macts{display:flex;justify-content:space-between;margin-top:18px;gap:8px;align-items:center}
.btn-del{background:rgba(200,0,0,.07);color:#c00;font-family:var(--font);font-size:11px;font-weight:700;padding:7px 13px;border-radius:var(--r);border:1px solid rgba(200,0,0,.2);cursor:pointer;transition:all .15s}
.btn-del:hover{background:rgba(200,0,0,.14)}
.rg{display:flex;gap:6px;flex-wrap:wrap}
.ro{display:none}
.rl{padding:5px 13px;border-radius:var(--r);border:1px solid var(--border2);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--text-mid);background:var(--bg)}
.rl:hover{border-color:var(--text-mid);color:var(--text)}
.ro[value="hans"]:checked+.rl{background:var(--hans-bg);border-color:var(--hans-bd);color:var(--hans)}
.ro[value="plugin"]:checked+.rl{background:var(--plugin-bg);border-color:var(--plugin-bd);color:var(--plugin)}
.ro[value="lifecycle"]:checked+.rl{background:var(--lifecycle-bg);border-color:var(--lifecycle-bd);color:var(--lifecycle)}
.ro[value="internal"]:checked+.rl{background:var(--internal-bg);border-color:var(--internal-bd);color:var(--internal)}
.cg{display:flex;gap:16px;flex-wrap:wrap}
.cl{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600;color:var(--text-mid);cursor:pointer;transition:color .12s}
.cl:hover{color:var(--text)}
.cl input{width:14px;height:14px;accent-color:var(--text);cursor:pointer}
</style>
</head>

  {id:'e010',title:'Pro/Pro+ early plugin access',date:'2026-05-13',campaign:'plugin',isLaunch:true,isMilestone:true,audience:'Current Pro / Pro+',notes:'Early access rollout begins'},
  {id:'e011',title:'Lifecycle go-live',date:'2026-05-29',campaign:'lifecycle',isLaunch:true,isMilestone:true,audience:'New signups',notes:'All flows active, signup question live, Wisepops popups live'},
  {id:'e012',title:'Plugin public launch',date:'2026-05-18',campaign:'plugin',isLaunch:true,isMilestone:true,audience:'Existing Pro + Pro+',notes:'Email 1 to existing Pro/Pro+. Organic social. Press TBD.'},
  {id:'e013',title:'Hans 2 video shoot',date:'2026-05-20',campaign:'hans',isLaunch:false,isMilestone:true,audience:'Internal',notes:'Hero concept shoot. All launch assets built from this footage.'},
  {id:'e014',title:'Lifetime plugin upsell window opens',date:'2026-05-25',campaign:'plugin',isLaunch:false,isMilestone:true,audience:'Existing Pro + Pro+',notes:'Exact date TBD May 25–Jun 1.'},
  {id:'e015',title:'Hans 2.0 full launch — popups, email, organic, paid',date:'2026-05-26',campaign:'hans',isLaunch:true,isMilestone:true,audience:'Current Pro/Pro+',notes:'Pushed to May 26 to incorporate video shoot assets. Emails, popups, organic, paid all launch together.'},
  {id:'e016',title:'Hans 2.0 Phase 2 — prospecting ads',date:'2026-06-01',campaign:'hans',isLaunch:false,isMilestone:true,audience:'New/cold audience',notes:'UGC + static ads to cold prospecting. $30k media budget. UTM: campaign=hans2'},
];

let events=JSON.parse(localStorage.getItem('audiio_cal_v3')||'null')||DEFAULTS;
let yr=2026,mo=4,view='month';
let filters=new Set(['hans','plugin','lifecycle','internal']);
let editId=null,dragId=null;

const save=()=>localStorage.setItem('audiio_cal_v3',JSON.stringify(events));
const fmt=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const label=c=>({hans:'Hans 2.0',plugin:'Plugin',lifecycle:'Lifecycle',internal:'Internal'}[c]||c);
const icon=ev=>ev.isLaunch?'🚀 ':ev.isMilestone?'🎯 ':'';

function render(){
  document.getElementById('navMonth').textContent=new Date(yr,mo).toLocaleString('default',{month:'long',year:'numeric'});
  view==='month'?renderMonth():renderList();
}
function renderMonth(){
  document.getElementById('cwrap').style.display='block';
  document.getElementById('lv').style.display='none';
  const grid=document.getElementById('grid');grid.innerHTML='';
  // Inject day headers as first row of same grid
  ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(day=>{
    const h=document.createElement('div');
    h.className='dhdr';
    h.textContent=day;
    grid.appendChild(h);
  });
  const first=new Date(yr,mo,1).getDay(),dim=new Date(yr,mo+1,0).getDate(),dipm=new Date(yr,mo,0).getDate();
  const today=new Date();today.setHours(0,0,0,0);
  const cells=[];
  for(let i=first-1;i>=0;i--)cells.push({d:dipm-i,o:true});
  for(let d=1;d<=dim;d++)cells.push({d,o:false});
  while(cells.length%7)cells.push({d:cells.length-dim-first+1,o:true});
  cells.forEach(({d,o})=>{
    const cell=document.createElement('div');
    cell.className='cell'+(o?' other':'');
    const cm=o&&d>15?mo-1:o?mo+1:mo;
    const dt=new Date(yr,cm,d);dt.setHours(0,0,0,0);
    if(dt.getTime()===today.getTime())cell.classList.add('today');
    const ds=fmt(dt);cell.dataset.date=ds;
    cell.innerHTML=`<div class="dnum">${d}</div><button class="addbtn" onclick="event.stopPropagation();openAdd('${ds}')">+</button>`;
    events.filter(e=>e.date===ds&&filters.has(e.campaign)).forEach(ev=>{
      const el=document.createElement('div');
      el.className=`ev ${ev.campaign}`;
      el.textContent=icon(ev)+ev.title;
      el.title=(ev.audience?ev.audience+'\n':'')+ev.notes;
      el.draggable=true;
      el.onclick=e=>{e.stopPropagation();openEdit(ev.id)};
      el.ondragstart=e=>{dragId=ev.id;e.dataTransfer.effectAllowed='move';setTimeout(()=>el.style.opacity='.35',0)};
      el.ondragend=()=>el.style.opacity='1';
      cell.appendChild(el);
    });
    cell.ondragover=e=>{e.preventDefault();cell.classList.add('dover')};
    cell.ondragleave=()=>cell.classList.remove('dover');
    cell.ondrop=e=>{
      e.preventDefault();cell.classList.remove('dover');
      if(dragId){const ev=events.find(e=>e.id===dragId);if(ev){ev.date=ds;save();render();}dragId=null;}
    };
    grid.appendChild(cell);
  });
}
function renderList(){
  document.getElementById('cwrap').style.display='none';
  const lv=document.getElementById('lv');lv.style.display='block';lv.innerHTML='';
  const sorted=events.filter(e=>filters.has(e.campaign)).sort((a,b)=>a.date.localeCompare(b.date));
  if(!sorted.length){lv.innerHTML='<div style="padding:48px;color:var(--text-dim);text-align:center;font-size:13px">No events</div>';return;}
  let lastMo=null;
  sorted.forEach(ev=>{
    const d=new Date(ev.date+'T00:00:00'),mk=`${d.getFullYear()}-${d.getMonth()}`;
    if(mk!==lastMo){lastMo=mk;const mh=document.createElement('div');mh.className='lmonth';mh.textContent=d.toLocaleString('default',{month:'long',year:'numeric'});lv.appendChild(mh);}
    const row=document.createElement('div');row.className='lrow';
    row.innerHTML=`<div class="ldate">${d.toLocaleString('default',{month:'short',day:'numeric'})}</div><div class="ldot" style="background:var(--${ev.campaign})"></div><div style="flex:1"><div class="ltitle ${ev.campaign}">${icon(ev)}${ev.title}</div>${ev.audience||ev.notes?`<div class="lnote">${[ev.audience,ev.notes].filter(Boolean).join(' — ')}</div>`:''}</div><span class="ltag ${ev.campaign}">${label(ev.campaign)}</span>`;
    row.onclick=()=>openEdit(ev.id);lv.appendChild(row);
  });
}
function openAdd(ds=''){
  editId=null;
  document.getElementById('mtitle').textContent='Add Event';
  ['fT','fA','fN'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fD').value=ds||fmt(new Date());
  document.getElementById('fE').value='';
  document.getElementById('fLa').checked=false;document.getElementById('fMi').checked=false;
  document.querySelectorAll('.ro').forEach(r=>r.checked=false);
  document.getElementById('delBtn').style.display='none';
  document.getElementById('ov').classList.add('open');
  setTimeout(()=>document.getElementById('fT').focus(),50);
}
function openEdit(id){
  const ev=events.find(e=>e.id===id);if(!ev)return;
  editId=id;
  document.getElementById('mtitle').textContent='Edit Event';
  document.getElementById('fT').value=ev.title;
  document.getElementById('fD').value=ev.date;
  document.getElementById('fE').value=ev.endDate||'';
  document.getElementById('fA').value=ev.audience||'';
  document.getElementById('fN').value=ev.notes||'';
  document.getElementById('fLa').checked=!!ev.isLaunch;document.getElementById('fMi').checked=!!ev.isMilestone;
  const r=document.querySelector(`.ro[value="${ev.campaign}"]`);if(r)r.checked=true;
  document.getElementById('delBtn').style.display='block';
  document.getElementById('ov').classList.add('open');
  setTimeout(()=>document.getElementById('fT').focus(),50);
}
function saveEvent(){
  const title=document.getElementById('fT').value.trim();if(!title)return;
  const campaign=document.querySelector('.ro:checked')?.value||'internal';
  const ev={id:editId||'e'+Date.now(),title,date:document.getElementById('fD').value,endDate:document.getElementById('fE').value||undefined,campaign,isLaunch:document.getElementById('fLa').checked,isMilestone:document.getElementById('fMi').checked,audience:document.getElementById('fA').value.trim(),notes:document.getElementById('fN').value.trim()};
  if(editId){const i=events.findIndex(e=>e.id===editId);if(i>-1)events[i]=ev;}else events.push(ev);
  save();closeOv();render();
}
function deleteEvent(){
  if(!editId||!confirm('Delete this event?'))return;
  events=events.filter(e=>e.id!==editId);save();closeOv();render();
}
function closeOv(){document.getElementById('ov').classList.remove('open')}
function changeMonth(dir){mo+=dir;if(mo>11){mo=0;yr++;}if(mo<0){mo=11;yr--;}render();}
function setView(v){view=v;document.getElementById('vM').classList.toggle('on',v==='month');document.getElementById('vL').classList.toggle('on',v==='list');render();}
function toggleFilter(c){
  const leg=document.querySelector(`.leg[data-filter="${c}"]`);
  if(filters.has(c)){if(filters.size===1)return;filters.delete(c);leg.classList.remove('on');}
  else{filters.add(c);leg.classList.add('on');}
  render();
}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeOv();
  if(!document.getElementById('ov').classList.contains('open')){
    if(e.key==='ArrowLeft')changeMonth(-1);
    if(e.key==='ArrowRight')changeMonth(1);
  }
});
render();
</script>
