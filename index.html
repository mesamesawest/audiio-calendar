<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audiio — Campaign Calendar</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f7f6f3;color:#111;font-size:13px}

.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 24px;background:#fff;border-bottom:1px solid #e2ddd7;position:sticky;top:0;z-index:50;flex-wrap:wrap;gap:8px}
.hdr-l{display:flex;align-items:center;gap:10px}
.hdr-title{font-size:14px;font-weight:700;letter-spacing:-.01em}
.hdr-sub{font-size:11px;color:#999;border-left:1px solid #ddd;padding-left:10px}
.hdr-r{display:flex;gap:6px;align-items:center}
.btn{font-size:12px;font-weight:600;padding:7px 14px;border-radius:6px;border:1px solid #ddd;cursor:pointer;background:#fff;color:#111;font-family:inherit;transition:all .15s}
.btn:hover{background:#f0ede8}
.btn-dark{background:#111;color:#fff;border-color:#111}
.btn-dark:hover{opacity:.85}

/* OVERVIEW */
.overview{background:#fff;border-bottom:1px solid #e2ddd7;padding:20px 24px}
.overview-title{font-size:10px;font-weight:700;color:#bbb;letter-spacing:.08em;text-transform:uppercase;margin-bottom:16px}
.camp-row{display:flex;align-items:baseline;gap:0;padding:9px 0;border-bottom:1px solid #f0ede8;flex-wrap:wrap;gap:6px}
.camp-row:last-child{border-bottom:none}
.camp-name{font-size:12px;font-weight:700;color:#111;width:180px;flex-shrink:0;display:flex;align-items:center;gap:6px;cursor:pointer}
.camp-name:hover{opacity:.75}
.tier-badge{font-size:8px;font-weight:700;padding:2px 5px;border-radius:3px;flex-shrink:0;letter-spacing:.03em}
.camp-phases{display:flex;align-items:center;gap:0;flex-wrap:wrap;flex:1}
.phase{display:flex;align-items:center;gap:6px}
.phase-arrow{color:#ddd;font-size:10px;margin:0 4px}
.phase-label{font-size:10px;font-weight:600;color:#999}
.phase-date{font-size:11px;font-weight:600}
.phase-launch .phase-label{color:#111}
.phase-launch .phase-date{color:#111}
.camp-tbd{font-size:11px;color:#ccc;font-weight:600;font-style:italic}

.tier-legend{display:flex;gap:20px;margin-top:16px;padding-top:14px;border-top:1px solid #f0ede8;flex-wrap:wrap}
.tleg{display:flex;align-items:center;gap:6px;font-size:10px;color:#999}
.tleg-badge{font-size:8px;font-weight:700;padding:2px 6px;border-radius:3px;letter-spacing:.03em}

/* NAV */
.nav{display:flex;align-items:center;padding:8px 24px;background:#f0ede8;border-bottom:1px solid #e2ddd7;position:sticky;top:49px;z-index:40}
.nav-btn{background:#fff;border:1px solid #ddd;color:#999;width:26px;height:26px;border-radius:5px;cursor:pointer;font-size:13px;font-family:inherit;transition:all .15s}
.nav-btn:hover{color:#111}
.nav-mo{font-size:13px;font-weight:600;padding:0 16px;min-width:140px;text-align:center}
.nav-r{margin-left:auto;display:flex;gap:2px;background:#fff;border:1px solid #ddd;border-radius:6px;padding:2px}
.vbtn{font-size:11px;font-weight:600;padding:3px 12px;border-radius:4px;border:none;background:none;color:#999;cursor:pointer;font-family:inherit;transition:all .15s}
.vbtn.on{background:#f0ede8;color:#111}

/* CALENDAR */
.cal{padding:0 24px 48px}
.day-hdrs{display:grid;grid-template-columns:repeat(7,1fr);margin-top:16px}
.day-hdr{padding:7px 8px;font-size:10px;font-weight:700;color:#ccc;letter-spacing:.07em;text-transform:uppercase;border-right:1px solid #e2ddd7;border-bottom:1px solid #e2ddd7;background:#f7f6f3}
.grid{display:grid;grid-template-columns:repeat(7,1fr);border-left:1px solid #e2ddd7;border-top:1px solid #e2ddd7}
.cell{min-height:96px;border-right:1px solid #e2ddd7;border-bottom:1px solid #e2ddd7;padding:6px;background:#fff;position:relative;transition:background .1s}
.cell.other{background:#f7f6f3;opacity:.5}
.cell.today{background:#fffef5}
.cell.today .dnum{background:#111;color:#fff;border-radius:50%;font-weight:700}
.cell:hover{background:#f7f6f3}
.dnum{font-size:11px;color:#ccc;width:20px;height:20px;display:flex;align-items:center;justify-content:center;margin-bottom:3px}
.ev{border-radius:3px;padding:2px 6px;margin-bottom:2px;font-size:9.5px;font-weight:600;border-left:2px solid;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer;transition:filter .12s}
.ev:hover{filter:brightness(.9)}
.add-btn{position:absolute;top:4px;right:4px;width:16px;height:16px;border-radius:50%;background:#eee;border:none;color:#999;font-size:14px;line-height:1;cursor:pointer;display:none;align-items:center;justify-content:center;font-family:inherit}
.cell:hover .add-btn{display:flex}
.add-btn:hover{background:#111;color:#fff}

/* LIST */
.lv{padding:0 24px 48px;margin-top:16px;display:none}
.lmo{font-size:10px;font-weight:700;color:#bbb;letter-spacing:.1em;text-transform:uppercase;padding:14px 0 7px;border-bottom:1px solid #e2ddd7}
.lrow{display:flex;gap:12px;padding:10px 8px;border-bottom:1px solid #e2ddd7;cursor:pointer;border-radius:5px;align-items:flex-start}
.lrow:hover{background:#f0ede8}
.ldate{font-size:11px;color:#999;width:42px;flex-shrink:0;padding-top:2px}
.ldot{width:6px;height:6px;border-radius:2px;flex-shrink:0;margin-top:4px}
.ltitle{font-size:12px;font-weight:600;flex:1;line-height:1.4}
.lnote{font-size:11px;color:#999;margin-top:2px;line-height:1.4}
.ltag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:3px;flex-shrink:0;margin-top:2px}

/* MODALS */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.ov.open{display:flex}
.modal{background:#fff;border-radius:12px;width:460px;max-width:95vw;padding:22px;position:relative;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-title{font-size:15px;font-weight:700;margin-bottom:16px}
.mclose{position:absolute;top:12px;right:14px;background:none;border:none;font-size:20px;cursor:pointer;color:#bbb;line-height:1;padding:4px}
.mclose:hover{color:#111}
.field{margin-bottom:12px}
.field label{display:block;font-size:10px;font-weight:700;color:#aaa;letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px}
.field input,.field textarea,.field select{width:100%;background:#f7f6f3;border:1px solid #e2ddd7;border-radius:6px;color:#111;font-family:inherit;font-size:13px;padding:8px 10px;outline:none;transition:border .15s}
.field input:focus,.field textarea:focus,.field select:focus{border-color:#111}
.field textarea{min-height:60px;resize:vertical}
.mrow{display:flex;gap:10px}.mrow .field{flex:1}
.mfooter{display:flex;justify-content:space-between;margin-top:16px;align-items:center;gap:8px}
.del-btn{font-size:11px;font-weight:600;padding:6px 12px;border-radius:6px;border:1px solid #fcc;background:#fff8f8;color:#c00;cursor:pointer;font-family:inherit}
.del-btn:hover{background:#fee}
.checks{display:flex;gap:16px}
.checks label{display:flex;align-items:center;gap:6px;font-size:12px;color:#888;cursor:pointer}
.color-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.cswatch{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s}
.cswatch:hover{transform:scale(1.15)}
.cswatch.sel{border-color:#111;transform:scale(1.1)}
.pills{display:flex;gap:5px;flex-wrap:wrap}
.pill{padding:5px 11px;border-radius:5px;border:1px solid #ddd;font-size:11px;font-weight:600;cursor:pointer;color:#999;background:#f7f6f3;font-family:inherit;transition:all .15s}
.pill:hover{color:#111}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-l">
    <span class="hdr-title">Audiio</span>
    <span class="hdr-sub">Campaign Calendar</span>
  </div>
  <div class="hdr-r">
    <button class="btn" onclick="openCampModal()">+ Campaign</button>
    <button class="btn btn-dark" onclick="openAdd()">+ Event</button>
  </div>
</div>

<div class="overview">
  <div class="overview-title">2026 Campaign Overview</div>
  <div id="overviewRows"></div>
  <div class="tier-legend">
    <div class="tleg"><span class="tleg-badge" style="background:rgba(180,64,0,.12);color:#a03800">T1</span>1,500+ transactions / $150k+ revenue · 9 weeks lead time</div>
    <div class="tleg"><span class="tleg-badge" style="background:rgba(0,109,153,.12);color:#005580">T2</span>250+ transactions / $25k+ revenue · 4 weeks lead time</div>
    <div class="tleg"><span class="tleg-badge" style="background:rgba(91,53,196,.12);color:#3d25a0">T3</span>&lt;250 transactions · 2 weeks lead time</div>
  </div>
</div>

<div class="nav">
  <button class="nav-btn" onclick="changeMonth(-1)">&#8592;</button>
  <div class="nav-mo" id="navMo"></div>
  <button class="nav-btn" onclick="changeMonth(1)">&#8594;</button>
  <div class="nav-r">
    <button class="vbtn on" id="vM" onclick="setView('month')">Month</button>
    <button class="vbtn" id="vL" onclick="setView('list')">List</button>
  </div>
</div>

<div class="cal" id="cal">
  <div class="day-hdrs" id="dayHdrs"></div>
  <div class="grid" id="grid"></div>
</div>
<div class="lv" id="lv"></div>

<!-- Event Modal -->
<div class="ov" id="evOv" onclick="if(event.target===this)closeEv()">
  <div class="modal">
    <div class="modal-title" id="evTitle">Add event</div>
    <button class="mclose" onclick="closeEv()">×</button>
    <div class="field"><label>Title</label><input id="fT" placeholder="Event title"/></div>
    <div class="mrow">
      <div class="field"><label>Date</label><input id="fD" type="date"/></div>
      <div class="field"><label>End date (opt)</label><input id="fE" type="date"/></div>
    </div>
    <div class="field"><label>Campaign</label><div class="pills" id="evPills"></div></div>
    <div class="field"><label>Type</label>
      <div class="checks">
        <label><input type="checkbox" id="fLa"> 🚀 Launch</label>
        <label><input type="checkbox" id="fMi"> 🎯 Milestone</label>
      </div>
    </div>
    <div class="field"><label>Audience</label><input id="fA" placeholder="e.g. Pro/Pro+"/></div>
    <div class="field"><label>Notes</label><textarea id="fN" placeholder="Details, dependencies..."></textarea></div>
    <div class="mfooter">
      <button class="del-btn" id="delBtn" onclick="deleteEv()" style="display:none">Delete event</button>
      <div style="margin-left:auto;display:flex;gap:8px">
        <button class="btn" onclick="closeEv()">Cancel</button>
        <button class="btn btn-dark" onclick="saveEv()">Save</button>
      </div>
    </div>
  </div>
</div>

<!-- Campaign Modal -->
<div class="ov" id="campOv" onclick="if(event.target===this)closeCamp()">
  <div class="modal">
    <div class="modal-title" id="campModalTitle">New campaign</div>
    <button class="mclose" onclick="closeCamp()">×</button>
    <div class="field"><label>Campaign name</label><input id="cName" placeholder="e.g. Summer Sale"/></div>
    <div class="mrow">
      <div class="field"><label>Tier</label>
        <select id="cTier">
          <option value="1">Tier 1 — $150k+ / 1,500+ tx</option>
          <option value="2">Tier 2 — $25k+ / 250+ tx</option>
          <option value="3">Tier 3 — &lt;$25k</option>
          <option value="0">Internal / No tier</option>
        </select>
      </div>
      <div class="field"><label>Launch date (opt)</label><input id="cLaunch" type="date"/></div>
    </div>
    <div class="field"><label>Color</label><div class="color-row" id="colorRow"></div></div>
    <div class="mfooter">
      <button class="del-btn" id="campDelBtn" onclick="deleteCamp()" style="display:none">Delete campaign</button>
      <div style="margin-left:auto;display:flex;gap:8px">
        <button class="btn" onclick="closeCamp()">Cancel</button>
        <button class="btn btn-dark" onclick="saveCamp()">Save</button>
      </div>
    </div>
  </div>
</div>

<script>
var COLORS=[
  {n:'green',  dot:'#4a7c00',bg:'rgba(74,124,0,.1)',   txt:'#3a6800'},
  {n:'blue',   dot:'#006d99',bg:'rgba(0,109,153,.1)',   txt:'#005580'},
  {n:'orange', dot:'#b84000',bg:'rgba(184,64,0,.1)',    txt:'#8a3000'},
  {n:'purple', dot:'#5b35c4',bg:'rgba(91,53,196,.1)',   txt:'#3d25a0'},
  {n:'teal',   dot:'#008c82',bg:'rgba(0,140,130,.1)',   txt:'#006b63'},
  {n:'pink',   dot:'#b42864',bg:'rgba(180,40,100,.1)',  txt:'#8a1f4e'},
  {n:'amber',  dot:'#b47800',bg:'rgba(180,120,0,.1)',   txt:'#8a5c00'},
  {n:'red',    dot:'#be2828',bg:'rgba(190,40,40,.1)',   txt:'#921e1e'},
];

// Phase definitions per tier
// weeksOut = weeks before launch
var TIER_PHASES={
  1:[
    {label:'Plan / Creative Concept', weeksOut:9},
    {label:'Prepare Deliverables',    weeksOut:6},
    {label:'Tease',                   weeksOut:1.5},
  ],
  2:[
    {label:'Plan / Creative Concept', weeksOut:4},
    {label:'Prepare Deliverables',    weeksOut:2},
  ],
  3:[
    {label:'Plan / Creative Concept', weeksOut:2},
  ],
};

var camps=[
  {id:'hans',      name:'Hans 2',             color:'green',  tier:1, launch:'2026-06-01'},
  {id:'sfx',       name:'Lifetime SFX',        color:'orange', tier:1, launch:'2026-06-22'},
  {id:'adobe',     name:'Adobe / Plugin',      color:'blue',   tier:2, launch:'2026-07-01'},
  {id:'taste',     name:'Taste',               color:'amber',  tier:3, launch:'2026-07-15'},
  {id:'elements',  name:'Lifetime Elements',   color:'teal',   tier:1, launch:null},
  {id:'ai',        name:'Lifetime AI Credits', color:'purple', tier:1, launch:'2026-09-01'},
  {id:'filmmaker', name:'Filmmaker Nashville', color:'pink',   tier:2, launch:'2026-10-01'},
  {id:'internal',  name:'Internal',            color:'red',    tier:0, launch:null},
];

var evs=[
  {id:'e001',title:'Hans 2 kick-off',date:'2026-04-29',campaign:'internal',isLaunch:false,isMilestone:true,audience:'Internal',notes:'Campaign creative kick-off'},
  {id:'e002',title:'Hans 2 — partner briefs sent',date:'2026-05-01',campaign:'hans',isLaunch:false,isMilestone:false,audience:'Partners',notes:'2 sent — more to follow'},
  {id:'e003',title:'Hans 2 creative due',date:'2026-05-08',campaign:'hans',isLaunch:false,isMilestone:true,audience:'Internal',notes:'Phase 1 assets due from Kate'},
  {id:'e004',title:'Hans 2 video shoot',date:'2026-05-20',campaign:'hans',isLaunch:false,isMilestone:true,audience:'Internal',notes:'Hero concept shoot'},
  {id:'e005',title:'Hans 2.0 launch',date:'2026-06-01',campaign:'hans',isLaunch:true,isMilestone:true,audience:'Pro/Pro+',notes:'All channels live'},
  {id:'e006',title:'Lifetime SFX launch',date:'2026-06-22',campaign:'sfx',isLaunch:true,isMilestone:true,audience:'TBD',notes:''},
  {id:'e007',title:'Adobe / Plugin launch',date:'2026-07-01',campaign:'adobe',isLaunch:true,isMilestone:true,audience:'Existing Pro+',notes:''},
  {id:'e008',title:'Taste launch',date:'2026-07-15',campaign:'taste',isLaunch:true,isMilestone:true,audience:'All users',notes:'Blog + email mix'},
  {id:'e009',title:'Lifetime AI Credits launch',date:'2026-09-01',campaign:'ai',isLaunch:true,isMilestone:true,audience:'TBD',notes:'Early fall'},
  {id:'e010',title:'Filmmaker Event — Nashville',date:'2026-10-01',campaign:'filmmaker',isLaunch:true,isMilestone:true,audience:'Filmmakers',notes:'October, exact date TBD'},
];

try{var sc=localStorage.getItem('aud_camps_v6');var se=localStorage.getItem('aud_evs_v6');if(sc)camps=JSON.parse(sc);if(se)evs=JSON.parse(se);}catch(e){}

var yr=2026,mo=4,view='month';
var editId=null,editCampId=null,selCamp=null,selColor='green',dragId=null;

function save(){try{localStorage.setItem('aud_camps_v6',JSON.stringify(camps));localStorage.setItem('aud_evs_v6',JSON.stringify(evs));}catch(e){}}
function fmt(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function addDays(ds,days){var d=new Date(ds+'T00:00:00');d.setDate(d.getDate()+days);return d;}
function fmtShort(d){return d.toLocaleString('default',{month:'short',day:'numeric'});}
function getCamp(id){return camps.find(function(c){return c.id===id;});}
function getCol(n){return COLORS.find(function(c){return c.n===n;})||COLORS[0];}
function campDot(id){var c=getCamp(id);return c?getCol(c.color).dot:'#888';}
function campBg(id){var c=getCamp(id);return c?getCol(c.color).bg:'rgba(0,0,0,.05)';}
function campTxt(id){var c=getCamp(id);return c?getCol(c.color).txt:'#444';}
function icon(ev){return ev.isLaunch?'🚀 ':ev.isMilestone?'🎯 ':'';}
function tierBadgeStyle(t){if(t==1)return 'background:rgba(180,64,0,.12);color:#a03800';if(t==2)return 'background:rgba(0,109,153,.12);color:#005580';if(t==3)return 'background:rgba(91,53,196,.12);color:#3d25a0';return 'background:#f0ede8;color:#999';}
function tierLabel(t){return t>0?'T'+t:'';}

function renderOverview(){
  var el=document.getElementById('overviewRows');el.innerHTML='';
  camps.filter(function(c){return c.tier>0;}).forEach(function(camp){
    var col=getCol(camp.color);
    var row=document.createElement('div');row.className='camp-row';

    // Name + badge
    var nameEl=document.createElement('div');nameEl.className='camp-name';
    nameEl.style.color=col.txt;
    nameEl.innerHTML='<span>'+camp.name+'</span>'+(tierLabel(camp.tier)?'<span class="tier-badge" style="'+tierBadgeStyle(camp.tier)+'">'+tierLabel(camp.tier)+'</span>':'');
    nameEl.onclick=function(){openCampEdit(camp.id);};
    row.appendChild(nameEl);

    // Phases
    var phases=document.createElement('div');phases.className='camp-phases';

    if(!camp.launch){
      var tbd=document.createElement('span');tbd.className='camp-tbd';tbd.textContent='Launch date TBD';
      phases.appendChild(tbd);
    } else {
      var launchDate=new Date(camp.launch+'T00:00:00');
      var tierPhases=TIER_PHASES[camp.tier]||[];

      tierPhases.forEach(function(phase,i){
        var phaseDate=addDays(camp.launch,-Math.round(phase.weeksOut*7));
        var phaseEl=document.createElement('div');phaseEl.className='phase';

        var lbl=document.createElement('span');lbl.className='phase-label';lbl.textContent=phase.label;
        var dt=document.createElement('span');dt.className='phase-date';dt.style.color=col.txt;dt.textContent=fmtShort(phaseDate);

        phaseEl.appendChild(lbl);
        phaseEl.appendChild(document.createTextNode(' '));
        phaseEl.appendChild(dt);

        var arrow=document.createElement('span');arrow.className='phase-arrow';arrow.textContent='→';
        phases.appendChild(phaseEl);
        phases.appendChild(arrow);
      });

      // Launch
      var launchEl=document.createElement('div');launchEl.className='phase phase-launch';
      var launchLbl=document.createElement('span');launchLbl.className='phase-label';launchLbl.textContent='Launch';
      var launchDt=document.createElement('span');launchDt.className='phase-date';launchDt.textContent='🚀 '+fmtShort(launchDate);
      launchEl.appendChild(launchLbl);
      launchEl.appendChild(document.createTextNode(' '));
      launchEl.appendChild(launchDt);
      phases.appendChild(launchEl);
    }

    row.appendChild(phases);
    el.appendChild(row);
  });
}

function render(){
  document.getElementById('navMo').textContent=new Date(yr,mo).toLocaleString('default',{month:'long',year:'numeric'});
  renderOverview();
  if(view==='month')renderMonth();else renderList();
}

function renderMonth(){
  document.getElementById('cal').style.display='block';
  document.getElementById('lv').style.display='none';
  var dh=document.getElementById('dayHdrs');dh.innerHTML='';
  ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(function(d){var h=document.createElement('div');h.className='day-hdr';h.textContent=d;dh.appendChild(h);});
  var grid=document.getElementById('grid');grid.innerHTML='';
  var first=new Date(yr,mo,1).getDay();
  var dim=new Date(yr,mo+1,0).getDate();
  var dipm=new Date(yr,mo,0).getDate();
  var today=new Date();today.setHours(0,0,0,0);
  var cells=[];
  for(var i=first-1;i>=0;i--)cells.push({d:dipm-i,o:true});
  for(var d=1;d<=dim;d++)cells.push({d:d,o:false});
  while(cells.length%7)cells.push({d:cells.length-dim-first+1,o:true});
  cells.forEach(function(c){
    var cell=document.createElement('div');cell.className='cell'+(c.o?' other':'');
    var cm=c.o&&c.d>15?mo-1:c.o?mo+1:mo;
    var dt=new Date(yr,cm,c.d);dt.setHours(0,0,0,0);
    if(dt.getTime()===today.getTime())cell.classList.add('today');
    var ds=fmt(dt);
    cell.innerHTML='<div class="dnum">'+c.d+'</div><button class="add-btn" onclick="event.stopPropagation();openAdd(\''+ds+'\')">+</button>';
    evs.filter(function(e){return e.date===ds;}).forEach(function(ev){
      var el=document.createElement('div');el.className='ev';
      el.style.background=campBg(ev.campaign);
      el.style.borderColor=campDot(ev.campaign);
      el.style.color=campTxt(ev.campaign);
      el.textContent=icon(ev)+ev.title;
      el.title=(ev.audience?ev.audience+'\n':'')+ev.notes;
      el.draggable=true;
      el.onclick=function(e){e.stopPropagation();openEdit(ev.id);};
      el.ondragstart=function(e){dragId=ev.id;e.dataTransfer.effectAllowed='move';setTimeout(function(){el.style.opacity='.3';},0);};
      el.ondragend=function(){el.style.opacity='1';};
      cell.appendChild(el);
    });
    cell.ondragover=function(e){e.preventDefault();cell.style.outline='2px dashed #bbb';};
    cell.ondragleave=function(){cell.style.outline='';};
    cell.ondrop=function(e){
      e.preventDefault();cell.style.outline='';
      if(dragId){var ev=evs.find(function(e){return e.id===dragId;});if(ev){ev.date=ds;save();render();}dragId=null;}
    };
    grid.appendChild(cell);
  });
}

function renderList(){
  document.getElementById('cal').style.display='none';
  var lv=document.getElementById('lv');lv.style.display='block';lv.innerHTML='';
  var sorted=evs.slice().sort(function(a,b){return a.date.localeCompare(b.date);});
  if(!sorted.length){lv.innerHTML='<div style="padding:48px;color:#ccc;text-align:center">No events</div>';return;}
  var lastMo=null;
  sorted.forEach(function(ev){
    var d=new Date(ev.date+'T00:00:00');
    var mk=d.getFullYear()+'-'+d.getMonth();
    if(mk!==lastMo){lastMo=mk;var mh=document.createElement('div');mh.className='lmo';mh.textContent=d.toLocaleString('default',{month:'long',year:'numeric'});lv.appendChild(mh);}
    var col=getCol((getCamp(ev.campaign)||{color:'green'}).color);
    var campName=(getCamp(ev.campaign)||{name:ev.campaign}).name;
    var ds=d.toLocaleString('default',{month:'short',day:'numeric'});
    var row=document.createElement('div');row.className='lrow';
    row.innerHTML='<div class="ldate">'+ds+'</div><div class="ldot" style="background:'+col.dot+'"></div><div style="flex:1"><div class="ltitle" style="color:'+col.txt+'">'+icon(ev)+ev.title+'</div>'+(ev.notes?'<div class="lnote">'+ev.notes+'</div>':'')+' </div><span class="ltag" style="background:'+col.bg+';color:'+col.txt+'">'+campName+'</span>';
    row.onclick=function(){openEdit(ev.id);};
    lv.appendChild(row);
  });
}

function buildPills(sel){
  var el=document.getElementById('evPills');el.innerHTML='';
  camps.forEach(function(c){
    var col=getCol(c.color);
    var p=document.createElement('div');p.className='pill'+(sel===c.id?' sel':'');
    if(sel===c.id){p.style.background=col.bg;p.style.borderColor=col.dot;p.style.color=col.txt;p.style.borderWidth='1.5px';}
    p.textContent=c.name;
    p.onclick=function(){
      selCamp=c.id;
      document.querySelectorAll('.pill').forEach(function(x){x.classList.remove('sel');x.style.cssText='';});
      p.classList.add('sel');p.style.background=col.bg;p.style.borderColor=col.dot;p.style.color=col.txt;p.style.borderWidth='1.5px';
    };
    el.appendChild(p);
  });
}

function openAdd(ds){
  editId=null;selCamp=camps[0]?camps[0].id:null;
  document.getElementById('evTitle').textContent='Add event';
  ['fT','fA','fN'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('fD').value=ds||fmt(new Date());
  document.getElementById('fE').value='';
  document.getElementById('fLa').checked=false;document.getElementById('fMi').checked=false;
  document.getElementById('delBtn').style.display='none';
  buildPills(selCamp);
  document.getElementById('evOv').classList.add('open');
  setTimeout(function(){document.getElementById('fT').focus();},50);
}

function openEdit(id){
  var ev=evs.find(function(e){return e.id===id;});if(!ev)return;
  editId=id;selCamp=ev.campaign;
  document.getElementById('evTitle').textContent='Edit event';
  document.getElementById('fT').value=ev.title;
  document.getElementById('fD').value=ev.date;
  document.getElementById('fE').value=ev.endDate||'';
  document.getElementById('fA').value=ev.audience||'';
  document.getElementById('fN').value=ev.notes||'';
  document.getElementById('fLa').checked=!!ev.isLaunch;document.getElementById('fMi').checked=!!ev.isMilestone;
  document.getElementById('delBtn').style.display='block';
  buildPills(selCamp);
  document.getElementById('evOv').classList.add('open');
  setTimeout(function(){document.getElementById('fT').focus();},50);
}

function saveEv(){
  var title=document.getElementById('fT').value.trim();if(!title)return;
  var ev={id:editId||'e'+Date.now(),title:title,date:document.getElementById('fD').value,endDate:document.getElementById('fE').value||undefined,campaign:selCamp||'internal',isLaunch:document.getElementById('fLa').checked,isMilestone:document.getElementById('fMi').checked,audience:document.getElementById('fA').value.trim(),notes:document.getElementById('fN').value.trim()};
  if(editId){var i=evs.findIndex(function(e){return e.id===editId;});if(i>-1)evs[i]=ev;}else evs.push(ev);
  save();closeEv();render();
}

function deleteEv(){if(!editId||!confirm('Delete this event?'))return;evs=evs.filter(function(e){return e.id!==editId;});save();closeEv();render();}
function closeEv(){document.getElementById('evOv').classList.remove('open');}

function buildColorSwatches(sel){
  var row=document.getElementById('colorRow');row.innerHTML='';
  COLORS.forEach(function(c){
    var el=document.createElement('div');el.className='cswatch'+(sel===c.n?' sel':'');
    el.style.background=c.dot;el.title=c.n;
    el.onclick=function(){selColor=c.n;document.querySelectorAll('.cswatch').forEach(function(x){x.classList.remove('sel');});el.classList.add('sel');};
    row.appendChild(el);
  });
}

function openCampModal(){
  editCampId=null;selColor='green';
  document.getElementById('campModalTitle').textContent='New campaign';
  document.getElementById('cName').value='';
  document.getElementById('cTier').value='2';
  document.getElementById('cLaunch').value='';
  document.getElementById('campDelBtn').style.display='none';
  buildColorSwatches('green');
  document.getElementById('campOv').classList.add('open');
  setTimeout(function(){document.getElementById('cName').focus();},50);
}

function openCampEdit(id){
  var c=getCamp(id);if(!c)return;
  editCampId=id;selColor=c.color;
  document.getElementById('campModalTitle').textContent='Edit campaign';
  document.getElementById('cName').value=c.name;
  document.getElementById('cTier').value=String(c.tier);
  document.getElementById('cLaunch').value=c.launch||'';
  document.getElementById('campDelBtn').style.display='block';
  buildColorSwatches(c.color);
  document.getElementById('campOv').classList.add('open');
  setTimeout(function(){document.getElementById('cName').focus();},50);
}

function saveCamp(){
  var name=document.getElementById('cName').value.trim();if(!name)return;
  var tier=parseInt(document.getElementById('cTier').value)||0;
  var launch=document.getElementById('cLaunch').value||null;
  if(editCampId){var c=getCamp(editCampId);if(c){c.name=name;c.tier=tier;c.launch=launch;c.color=selColor;}}
  else camps.push({id:'camp_'+Date.now(),name:name,color:selColor,tier:tier,launch:launch});
  save();closeCamp();render();
}

function deleteCamp(){if(!editCampId||!confirm('Delete this campaign? Events will remain.'))return;camps=camps.filter(function(c){return c.id!==editCampId;});save();closeCamp();render();}
function closeCamp(){document.getElementById('campOv').classList.remove('open');}

function changeMonth(dir){mo+=dir;if(mo>11){mo=0;yr++;}if(mo<0){mo=11;yr--;}render();}
function setView(v){view=v;document.getElementById('vM').classList.toggle('on',v==='month');document.getElementById('vL').classList.toggle('on',v==='list');render();}

document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){closeEv();closeCamp();}
  if(!document.getElementById('evOv').classList.contains('open')&&!document.getElementById('campOv').classList.contains('open')){
    if(e.key==='ArrowLeft')changeMonth(-1);
    if(e.key==='ArrowRight')changeMonth(1);
  }
});

render();
</script>
</body>
</html>
